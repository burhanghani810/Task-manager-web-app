<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    <link rel="stylesheet" href="task1.css">
</head>
<body>
    <header>
        <h1>Task Manager</h1>
    </header>

    <main class="container">
        <aside class="left-aside">
            <h2>Tasks To Do</h2>
            <table id="left_table">
                <thead>
                    <tr>
                        <th>Task Name</th>
                        <th>Task Description</th>
                        <th>Assigned Date</th>
                        <th>Due Date</th>
                        <th>Done</th>
                    </tr>
                </thead>
                <tbody id="left_tbody">
                    <!-- rows added here -->
                </tbody>
            </table>
        </aside>

        <section class="center-form">
            <div class="card">
                <h2>Add New Task</h2>
                <div class="form-group">
                    <label for="T_name">Task Name</label>
                    <input type="text" id="T_name" placeholder="Task name">
                </div>
                <div class="form-group">
                    <label for="T_desc">Task Description</label>
                    <input type="text" id="T_desc" placeholder="Description">
                </div>
                <div class="form-row">
                    <div class="form-group small">
                        <label for="assigned_date">Assigned Date</label>
                        <input type="date" id="assigned_date">
                    </div>
                    <div class="form-group small">
                        <label for="due_date">Due Date</label>
                        <input type="date" id="due_date">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="addBtn">Add Task</button>
                </div>
            </div>
        </section>

        <aside class="right-aside">
            <h2>Completed Tasks</h2>
            <table id="right_table">
                <thead>
                    <tr>
                        <th>Task Name</th>
                        <th>Task Description</th>
                        <th>Assigned Date</th>
                        <th>Due Date</th>
                    </tr>
                </thead>
                <tbody id="right_tbody">
                    <!-- moved rows appear here -->
                </tbody>
            </table>
        </aside>
    </main>

    <script src="task1.js"></script>
</body>
</html>
